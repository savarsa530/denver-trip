document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

gba(52,33,74,.38);--surface-2:rgba(38,24,56,.55);\n  --line:rgba(127,245,208,.16);--line-strong:rgba(127,245,208,.34);\n  --line-gold:rgba(237,192,106,.28);\n  --mint:#7ff5d0;--mint-dim:#4fb99a;--gold:#edc06a;--gold-dim:#b9924a;\n  --text:#ece5f4;--muted:#9d90b6;--muted-2:#6f6488;--rose:#d99ab0;\n}\n*{box-sizing:border-box}\nhtml{scroll-behavior:smooth}\nbody{\n  margin:0;font-family:'Work Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);\n  background:\n    radial-gradient(1100px 620px at 12% -8%, rgba(127,245,208,.10), transparent 60%),\n    radial-gradient(900px 560px at 108% 4%, rgba(237,192,106,.10), transparent 58%),\n    linear-gradient(168deg, var(--plum-deep) 0%, var(--plum) 42%, var(--forest) 100%);\n  background-attachment:fixed;min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;\n}\n@keyframes floatToast{0%{opacity:0;transform:translate(-50%,10px) scale(.9)}12%{opacity:1;transform:translate(-50%,0) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-14px) scale(1)}}\n@keyframes shimmerB{0%{background-position:-140% 0}100%{background-position:240% 0}}\n@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(237,192,106,.0)}50%{box-shadow:0 0 22px 2px rgba(237,192,106,.28)}}\n@media (prefers-reduced-motion: reduce){*{transition:none !important;animation:none !important}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width:840px;margin:0 auto;padding:26px 18px 90px\">\n\n  <!-- HERO -->\n  <header style=\"padding:14px 4px 6px\">\n    <div style=\"font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mint-dim);margin-bottom:10px\">Steph &amp; Sheena · A Living Trip Artifact<\u002Fdiv>\n    <h1 style=\"font-size:clamp(3.6rem,13vw,5.8rem);font-weight:400;line-height:.9;margin:0 0 8px;letter-spacing:.5px\"><span style=\"font-family:'Great Vibes',cursive\">Wheels Up<\u002Fspan><span style=\"display:block;font-family:'Work Sans',sans-serif;font-size:.2em;font-style:italic;font-weight:400;color:var(--gold);letter-spacing:.3px;margin-top:12px\">Portland → Denver · Jul 7–11 · then lived, logged &amp; kept<\u002Fspan><\u002Fh1>\n    <p style=\"font-size:1.18rem;color:var(--muted);font-style:italic;max-width:56ch;margin:14px 2px 4px;border-left:2px solid var(--gold-dim);padding-left:14px\">The point of packing early is not the packing. It's arriving unhurried, with a body that got to rest — so you can actually be where you're going. Do the motions up top. Then, below, let the trip fill this page in as it happens.<\u002Fp>\n  <\u002Fheader>\n\n  <!-- PREP HUD -->\n  <div style=\"position:sticky;top:0;z-index:20;margin:22px -4px 8px;background:linear-gradient(180deg, rgba(22,12,34,.94), rgba(22,12,34,.78));backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:16px;padding:14px 16px 12px\">\n    <div style=\"display:flex;gap:16px;flex-wrap:wrap\">\n      <div style=\"flex:1 1 160px;min-width:150px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\"><span style=\"font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)\">Ready<\u002Fspan><span style=\"font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text)\">{{ prep.readyVal }}<\u002Fspan><\u002Fdiv>\n        <div style=\"height:8px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden\"><i style=\"display:block;height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1);background:linear-gradient(90deg,var(--mint-dim),var(--mint));width:{{ prep.readyPct }}\"><\u002Fi><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 160px;min-width:150px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\"><span style=\"font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)\">Present<\u002Fspan><span style=\"font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text)\">{{ prep.presentVal }}<\u002Fspan><\u002Fdiv>\n        <div style=\"height:8px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden\"><i style=\"display:block;height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1);background:linear-gradient(90deg,var(--gold-dim),var(--gold));width:{{ prep.presentPct }}\"><\u002Fi><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-top:12px\">\n      <sc-for list=\"{{ prep.stars }}\" as=\"s\" hint-placeholder-count=\"12\"><b style=\"{{ s.style }}\"><\u002Fb><\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-top:10px;color:var(--muted-2);font-style:italic;font-size:.98rem;min-height:1.2em\">{{ prep.note }}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- NAV -->\n  <nav style=\"display:flex;flex-wrap:wrap;gap:7px;margin:16px 0 8px\">\n    <sc-for list=\"{{ navLinks }}\" as=\"l\" hint-placeholder-count=\"10\">\n      <a href=\"{{ l.href }}\" style=\"text-decoration:none;color:var(--muted);border:1px solid {{ l.border }};border-radius:99px;padding:5px 11px;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase\" style-hover=\"color:var(--mint);background:rgba(127,245,208,.06)\">{{ l.label }}<\u002Fa>\n    <\u002Fsc-for>\n  <\u002Fnav>\n\n  <!-- ===================== PREP HALF ===================== -->\n\n  <!-- TRIP GLANCE -->\n  <section id=\"trip\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface);border:1px solid var(--line);border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:150px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--mint-dim),transparent 70%);opacity:.5\"><\u002Fdiv>\n    <h2 style=\"font-size:1.9rem;font-weight:500;margin:0 0 4px;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;vertical-align:middle;margin-right:8px\">REF<\u002Fspan>The Trip, at a glance<\u002Fh2>\n    <p style=\"color:var(--muted);margin:6px 0 14px;font-size:1.1rem\">Southwest · Confirmation <strong style=\"color:var(--mint);font-family:'DM Mono',monospace;font-size:.9em\">CSPE4I<\u002Fstrong> · one stop each way at BWI. Sheena drives you to/from DEN; you're in her guest room.<\u002Fp>\n    <div style=\"display:grid;gap:8px\">\n      <sc-for list=\"{{ legs }}\" as=\"leg\" hint-placeholder-count=\"6\">\n        <div style=\"display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line)\">\n          <sc-if value=\"{{ leg.hasflight }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ leg.href }}\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'DM Mono',monospace;font-size:.72rem;color:var(--mint);text-decoration:none;border-bottom:1px dotted var(--mint-dim)\" style-hover=\"color:var(--gold);border-color:var(--gold)\">{{ leg.code }} ↗<\u002Fa><\u002Fsc-if><sc-if value=\"{{ leg.noflight }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)\">{{ leg.code }}<\u002Fspan><\u002Fsc-if>\n          <span style=\"font-size:1.12rem;color:{{ leg.routeColor }}\">{{ leg.route }}<\u002Fspan>\n          <span style=\"font-family:'DM Mono',monospace;font-size:.66rem;color:var(--gold);text-align:right\">{{ leg.seat }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-top:12px;display:flex;flex-wrap:wrap;gap:6px\">\n      <span style=\"font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:3px 9px\">Casa Bonita · Thu 7/9 · 5:30–7:30p<\u002Fspan>\n      <span style=\"font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:3px 9px\">Meow Wolf · Convergence Station<\u002Fspan>\n      <span style=\"font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:3px 9px\">~35 min PWM → home<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"border-left:2px solid var(--gold-dim);padding:4px 0 4px 14px;margin:14px 0 0;color:var(--muted);font-style:italic;font-size:1.05rem\">ID is sorted: your <strong style=\"color:var(--text)\">US passport book <em>or<\u002Fem> passport card<\u002Fstrong> both work for domestic flights and both count as REAL ID. Grab whichever's easier and set it by the door.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- KIKI -->\n  <section id=\"kiki\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface);border:1px solid {{ prep.kikiCleared.border }};border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:150px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:{{ prep.kikiCleared.rail }};opacity:{{ prep.kikiCleared.op }}\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px;cursor:pointer\" onclick=\"{{ collapse.kiki.toggle }}\"><h2 style=\"font-size:1.9rem;font-weight:500;margin:0;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">01<\u002Fspan>Kiki's Care Plan<\u002Fh2><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);opacity:{{ prep.kikiCleared.badge }};white-space:nowrap\">✦ cleared<\u002Fspan><span style=\"{{ collapse.kiki.chevStyle }}\">⌄<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:grid;grid-template-rows:{{ collapse.kiki.rows }};transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1)\"><div style=\"overflow:hidden;min-height:0\">\n    <div style=\"border:1px solid var(--line-strong);background:rgba(127,245,208,.05);border-radius:12px;padding:12px 14px;margin:6px 0 14px\">\n      <span style=\"font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mint)\">The call — plainly<\u002Fspan>\n      <p style=\"margin:6px 0 0;font-size:1.12rem\"><strong>Inside, with AC. Not the tent.<\u002Fstrong> Four nights of overnight exposure isn't a risk worth taking. Inside, full stop. The tent's only job this trip is hiding Nicole's key.<\u002Fp>\n    <\u002Fdiv>\n    <p style=\"color:var(--muted);margin:0 0 10px;font-size:1.1rem\">AC note: you're running it at <em>~68°<\u002Fem> so it can actually keep up with the heat wave. Two safety nets now in place — it's on the Alexa app (nudge the temp from Denver) and the Echo Show is live, so you can drop in on Kiki whenever you want.<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;gap:2px\">\n      <sc-for list=\"{{ prep.kiki }}\" as=\"item\" hint-placeholder-count=\"7\">\n        <div style=\"display:flex;gap:11px;align-items:flex-start;cursor:pointer;padding:9px 10px;border-radius:10px\" style-hover=\"background:rgba(255,255,255,.03)\" onclick=\"{{ item.toggle }}\">\n          <span style=\"{{ item.boxStyle }}\"><span style=\"{{ item.dotStyle }}\"><\u002Fspan><\u002Fspan>\n          <span style=\"{{ item.txtStyle }}\"><sc-if value=\"{{ item.tag }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.14em;color:var(--gold);border:1px solid var(--gold-dim);border-radius:4px;padding:1px 5px;margin-right:7px;text-transform:uppercase\">{{ item.tag }}<\u002Fspan><\u002Fsc-if>{{ item.txt }}<sc-if value=\"{{ item.note }}\" hint-placeholder-val=\"{{ false }}\"><small style=\"display:block;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;color:var(--muted-2);text-transform:uppercase;margin-top:3px;text-decoration:none\">{{ item.note }}<\u002Fsmall><\u002Fsc-if><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- NICOLE -->\n  <section id=\"nicole\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface);border:1px solid var(--line);border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:150px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--mint-dim),transparent 70%);opacity:.5\"><\u002Fdiv>\n    <h2 style=\"font-size:1.9rem;font-weight:500;margin:0 0 4px;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">01b<\u002Fspan>The Nicole Handoff<\u002Fh2>\n    <p style=\"color:var(--muted);margin:6px 0 12px;font-size:1.1rem\">One note on the counter covers everything Nicole needs. Edit it right here — it saves and syncs live, so tweak it from your phone and print the final version before you go. (Send the key's hiding spot by text, not on the note.)<\u002Fp>\n    <div style=\"border:1px solid var(--line);border-radius:12px;background:var(--surface-2);padding:14px 15px;margin:10px 0\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px\"><span style=\"font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)\">Counter note · editable<\u002Fspan><button style=\"{{ copyNicole.style }}\" onclick=\"{{ copyNicole.click }}\">{{ copyNicole.label }}<\u002Fbutton><\u002Fdiv>\n      <textarea rows=\"14\" value=\"{{ nicoleNote }}\" onchange=\"{{ onNicole }}\" placeholder=\"What Nicole needs to know…\" style=\"width:100%;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:10px;color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;line-height:1.6;padding:12px 13px;outline:none;resize:vertical\"><\u002Ftextarea>\n    <\u002Fdiv>\n    <div style=\"border-left:2px solid var(--gold-dim);padding:4px 0 4px 14px;margin:12px 0 0;color:var(--muted);font-style:italic;font-size:1.05rem\"><span style=\"color:var(--rose)\">Fill the brackets<\u002Fspan> before you print it: treats spot, feeder room, plant location, your cell, vet contact.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PARKING -->\n  <section id=\"parking\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface);border:1px solid {{ prep.parkingCleared.border }};border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:150px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:{{ prep.parkingCleared.rail }};opacity:{{ prep.parkingCleared.op }}\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px;cursor:pointer\" onclick=\"{{ collapse.parking.toggle }}\"><h2 style=\"font-size:1.9rem;font-weight:500;margin:0;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">02<\u002Fspan>PWM Parking<\u002Fh2><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);opacity:{{ prep.parkingCleared.badge }}\">✦ cleared<\u002Fspan><span style=\"{{ collapse.parking.chevStyle }}\">⌄<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:grid;grid-template-rows:{{ collapse.parking.rows }};transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1)\"><div style=\"overflow:hidden;min-height:0\">\n    <div style=\"border:1px solid var(--line-strong);background:rgba(127,245,208,.05);border-radius:12px;padding:12px 14px;margin:6px 0 14px\">\n      <span style=\"font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mint)\">The call<\u002Fspan>\n      <p style=\"margin:6px 0 0;font-size:1.12rem\"><strong>Garage, but reserve it.<\u002Fstrong> Covered (no scraping dew off the car at 12:40 AM Saturday) and steps from the terminal — but it sells out in summer, and your 7:30a arrival lands inside PWM's 7a–3p high-volume window when they redirect arrivals to alternate lots. A prepaid reservation removes the gamble. Backup if you don't reserve: the Economy or Pink shuttle lots. Cell-phone lot is free if plans change to a drop-off.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px\">\n      <a href=\"https://portlandjetport.org/parking\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--plum-deep);background:var(--mint);border-radius:99px;padding:7px 13px\">Live lot status ↗<\u002Fa>\n      <a href=\"https://portlandjetport.org/parking\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);border:1px solid var(--line-gold);border-radius:99px;padding:7px 13px\">Reserve a spot ↗<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:2px\">\n      <sc-for list=\"{{ prep.parking }}\" as=\"item\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;gap:11px;align-items:flex-start;cursor:pointer;padding:9px 10px;border-radius:10px\" style-hover=\"background:rgba(255,255,255,.03)\" onclick=\"{{ item.toggle }}\">\n          <span style=\"{{ item.boxStyle }}\"><span style=\"{{ item.dotStyle }}\"><\u002Fspan><\u002Fspan>\n          <span style=\"{{ item.txtStyle }}\">{{ item.txt }}<sc-if value=\"{{ item.note }}\" hint-placeholder-val=\"{{ false }}\"><small style=\"display:block;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;color:var(--muted-2);text-transform:uppercase;margin-top:3px;text-decoration:none\">{{ item.note }}<\u002Fsmall><\u002Fsc-if><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PACKING -->\n  <section id=\"pack\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface);border:1px solid {{ prep.packCleared.border }};border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:150px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:{{ prep.packCleared.rail }};opacity:{{ prep.packCleared.op }}\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px;cursor:pointer\" onclick=\"{{ collapse.pack.toggle }}\"><h2 style=\"font-size:1.9rem;font-weight:500;margin:0;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">03<\u002Fspan>Carry-On Packing<\u002Fh2><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);opacity:{{ prep.packCleared.badge }}\">✦ cleared<\u002Fspan><span style=\"{{ collapse.pack.chevStyle }}\">⌄<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:grid;grid-template-rows:{{ collapse.pack.rows }};transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1)\"><div style=\"overflow:hidden;min-height:0\">\n    <p style=\"color:var(--muted);margin:6px 0 8px;font-size:1.1rem;font-style:italic\">Carry-on only, ~22×14×9. Denver: hot days, cool nights, possible afternoon storm. TJ Maxx run is Sunday.<\u002Fp>\n    <h3 style=\"font-size:1.15rem;font-weight:600;color:var(--gold);margin:16px 0 6px;letter-spacing:.3px\">Clothing<\u002Fh3>\n    <div style=\"display:flex;flex-direction:column;gap:2px\">\n      <sc-for list=\"{{ prep.packClothing }}\" as=\"item\" hint-placeholder-count=\"7\">\n        <div style=\"display:flex;gap:11px;align-items:flex-start;cursor:pointer;padding:9px 10px;border-radius:10px\" style-hover=\"background:rgba(255,255,255,.03)\" onclick=\"{{ item.toggle }}\"><span style=\"{{ item.boxStyle }}\"><span style=\"{{ item.dotStyle }}\"><\u002Fspan><\u002Fspan><span style=\"{{ item.txtStyle }}\">{{ item.txt }}<sc-if value=\"{{ item.note }}\" hint-placeholder-val=\"{{ false }}\"><small style=\"display:block;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;color:var(--muted-2);text-transform:uppercase;margin-top:3px;text-decoration:none\">{{ item.note }}<\u002Fsmall><\u002Fsc-if><\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <h3 style=\"font-size:1.15rem;font-weight:600;color:var(--gold);margin:16px 0 6px;letter-spacing:.3px\">Toiletries <span style=\"font-weight:400;color:var(--muted);font-size:.85em\">(all ≤3.4oz, one quart bag)<\u002Fspan><\u002Fh3>\n    <div style=\"display:flex;flex-direction:column;gap:2px\">\n      <sc-for list=\"{{ prep.packToiletries }}\" as=\"item\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex;gap:11px;align-items:flex-start;cursor:pointer;padding:9px 10px;border-radius:10px\" style-hover=\"background:rgba(255,255,255,.03)\" onclick=\"{{ item.toggle }}\"><span style=\"{{ item.boxStyle }}\"><span style=\"{{ item.dotStyle }}\"><\u002Fspan><\u002Fspan><span style=\"{{ item.txtStyle }}\">{{ item.txt }}<sc-if value=\"{{ item.note }}\" hint-placeholder-val=\"{{ false }}\"><small style=\"display:block;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;color:var(--muted-2);text-transform:uppercase;margin-top:3px;text-decoration:none\">{{ item.note }}<\u002Fsmall><\u002Fsc-if><\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <h3 style=\"font-size:1.15rem;font-weight:600;color:var(--gold);margin:16px 0 6px;letter-spacing:.3px\">Electronics · Documents · Misc<\u002Fh3>\n    <div style=\"display:flex;flex-direction:column;gap:2px\">\n      <sc-for list=\"{{ prep.packElec }}\" as=\"item\" hint-placeholder-count=\"7\">\n        <div style=\"display:flex;gap:11px;align-items:flex-start;cursor:pointer;padding:9px 10px;border-radius:10px\" style-hover=\"background:rgba(255,255,255,.03)\" onclick=\"{{ item.toggle }}\"><span style=\"{{ item.boxStyle }}\"><span style=\"{{ item.dotStyle }}\"><\u002Fspan><\u002Fspan><span style=\"{{ item.txtStyle }}\">{{ item.txt }}<sc-if value=\"{{ item.note }}\" hint-placeholder-val=\"{{ false }}\"><small style=\"display:block;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;color:var(--muted-2);text-transform:uppercase;margin-top:3px;text-decoration:none\">{{ item.note }}<\u002Fsmall><\u002Fsc-if><\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"border-left:2px solid var(--gold-dim);padding:4px 0 4px 14px;margin:14px 0 0;color:var(--muted);font-style:italic;font-size:1.05rem\"><strong style=\"color:var(--text)\">TJ Maxx, Sunday — 45 min, in and out:<\u002Fstrong> rolling carry-on (verify ~22\" tag), packing cubes, travel bottles, rain shell, cable/battery if needed. You have a list. Don't browse.<\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- GROCERY -->\n  <section id=\"grocery\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface);border:1px solid {{ prep.groceryCleared.border }};border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:150px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:{{ prep.groceryCleared.rail }};opacity:{{ prep.groceryCleared.op }}\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px;cursor:pointer\" onclick=\"{{ collapse.grocery.toggle }}\"><h2 style=\"font-size:1.9rem;font-weight:500;margin:0;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">03b<\u002Fspan>Pre-Trip Grocery Plan<\u002Fh2><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);opacity:{{ prep.groceryCleared.badge }}\">✦ cleared<\u002Fspan><span style=\"{{ collapse.grocery.chevStyle }}\">⌄<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:grid;grid-template-rows:{{ collapse.grocery.rows }};transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1)\"><div style=\"overflow:hidden;min-height:0\">\n    <p style=\"color:var(--muted);margin:6px 0 8px;font-size:1.1rem;font-style:italic\">For the kids' week home (~Jul 13–17): 5 packed camp lunches, fast breakfasts, autopilot dinners. Shop now, but the eating is 7–10 days out — so it splits.<\u002Fp>\n    <p style=\"font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mint);margin:16px 0 6px\">Buy now — survives the trip<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:2px 22px\">\n      <sc-for list=\"{{ prep.groNow }}\" as=\"item\" hint-placeholder-count=\"20\">\n        <div style=\"display:flex;gap:11px;align-items:flex-start;cursor:pointer;padding:8px 10px;border-radius:10px\" style-hover=\"background:rgba(255,255,255,.03)\" onclick=\"{{ item.toggle }}\"><span style=\"{{ item.boxStyle }}\"><span style=\"{{ item.dotStyle }}\"><\u002Fspan><\u002Fspan><span style=\"{{ item.txtStyle }}\">{{ item.txt }}<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <p style=\"font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mint);margin:18px 0 6px\">Fresh — return run / pickup ~Jul 12–13<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:2px 22px\">\n      <sc-for list=\"{{ prep.groFresh }}\" as=\"item\" hint-placeholder-count=\"10\">\n        <div style=\"display:flex;gap:11px;align-items:flex-start;cursor:pointer;padding:8px 10px;border-radius:10px\" style-hover=\"background:rgba(255,255,255,.03)\" onclick=\"{{ item.toggle }}\"><span style=\"{{ item.boxStyle }}\"><span style=\"{{ item.dotStyle }}\"><\u002Fspan><\u002Fspan><span style=\"{{ item.txtStyle }}\">{{ item.txt }}<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"border-left:2px solid var(--gold-dim);padding:4px 0 4px 14px;margin:14px 0 0;color:var(--muted);font-style:italic;font-size:1.05rem\"><strong style=\"color:var(--text)\">Answer before you shop:<\u002Fstrong> is Eliza's Y-camp nut-free? Sunbutter's in the list to be safe — swap to peanut butter if camp allows.<\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COUNTDOWN -->\n  <section id=\"count\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface);border:1px solid {{ prep.countdownCleared.border }};border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:150px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:{{ prep.countdownCleared.rail }};opacity:{{ prep.countdownCleared.op }}\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px;cursor:pointer\" onclick=\"{{ collapse.count.toggle }}\"><h2 style=\"font-size:1.9rem;font-weight:500;margin:0;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">04<\u002Fspan>The Countdown<\u002Fh2><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);opacity:{{ prep.countdownCleared.badge }}\">✦ cleared<\u002Fspan><span style=\"{{ collapse.count.chevStyle }}\">⌄<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:grid;grid-template-rows:{{ collapse.count.rows }};transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1)\"><div style=\"overflow:hidden;min-height:0\">\n    <p style=\"color:var(--muted);margin:6px 0 8px;font-size:1.1rem;font-style:italic\">One trail, four chapters, now → wheels up. Each chapter has a <span style=\"color:var(--gold)\">boss<\u002Fspan>. Gold circles are presence, not chores.<\u002Fp>\n    <sc-for list=\"{{ prep.chapters }}\" as=\"ch\" hint-placeholder-count=\"4\">\n      <h3 style=\"font-size:1.15rem;font-weight:600;color:var(--gold);margin:18px 0 6px;letter-spacing:.3px\">{{ ch.title }} <span style=\"font-weight:400;color:var(--muted);font-size:.8em\">{{ ch.sub }}<\u002Fspan><\u002Fh3>\n      <div style=\"display:flex;flex-direction:column;gap:2px\">\n        <sc-for list=\"{{ ch.items }}\" as=\"item\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;gap:11px;align-items:flex-start;cursor:pointer;padding:9px 10px;border-radius:10px\" style-hover=\"background:rgba(255,255,255,.03)\" onclick=\"{{ item.toggle }}\"><span style=\"{{ item.boxStyle }}\"><span style=\"{{ item.dotStyle }}\"><\u002Fspan><\u002Fspan><span style=\"{{ item.txtStyle }}\"><sc-if value=\"{{ item.tag }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.14em;color:var(--gold);border:1px solid var(--gold-dim);border-radius:4px;padding:1px 5px;margin-right:7px;text-transform:uppercase\">{{ item.tag }}<\u002Fspan><\u002Fsc-if>{{ item.txt }}<sc-if value=\"{{ item.note }}\" hint-placeholder-val=\"{{ false }}\"><small style=\"display:block;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;color:var(--muted-2);text-transform:uppercase;margin-top:3px;text-decoration:none\">{{ item.note }}<\u002Fsmall><\u002Fsc-if><\u002Fspan><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MORNING OF -->\n  <section id=\"dontforget\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface);border:1px solid {{ prep.morningCleared.border }};border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:150px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:{{ prep.morningCleared.rail }};opacity:{{ prep.morningCleared.op }}\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;cursor:pointer\" onclick=\"{{ collapse.dontforget.toggle }}\"><h2 style=\"font-size:1.9rem;font-weight:500;margin:0;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">05<\u002Fspan>Morning-Of “Don't Forget”<\u002Fh2><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);opacity:{{ prep.morningCleared.badge }}\">✦ cleared<\u002Fspan><span style=\"{{ collapse.dontforget.chevStyle }}\">⌄<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:grid;grid-template-rows:{{ collapse.dontforget.rows }};transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1)\"><div style=\"overflow:hidden;min-height:0\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:2px 22px\">\n      <sc-for list=\"{{ prep.morning }}\" as=\"item\" hint-placeholder-count=\"8\">\n        <div style=\"display:flex;gap:11px;align-items:flex-start;cursor:pointer;padding:8px 10px;border-radius:10px\" style-hover=\"background:rgba(255,255,255,.03)\" onclick=\"{{ item.toggle }}\"><span style=\"{{ item.boxStyle }}\"><span style=\"{{ item.dotStyle }}\"><\u002Fspan><\u002Fspan><span style=\"{{ item.txtStyle }}\">{{ item.txt }}<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== DIVIDER: TRIP GOES LIVE ===================== -->\n  <div id=\"live\" style=\"margin:44px 0 8px;text-align:center;scroll-margin-top:120px\">\n    <div style=\"font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px\">— the prep is done, the trip is now —<\u002Fdiv>\n    <h2 style=\"font-family:'Great Vibes',cursive;font-size:clamp(3rem,10vw,4.6rem);font-weight:400;margin:0;letter-spacing:.5px;line-height:.95;background:linear-gradient(90deg,var(--mint),var(--gold),var(--rose));-webkit-background-clip:text;background-clip:text;color:transparent\">In Denver — live<\u002Fh2>\n    <p style=\"color:var(--muted);font-style:italic;font-size:1.12rem;max-width:52ch;margin:10px auto 0\">Everything below fills in as you go. Catch moments, score points, drop photos, log the days. This page becomes the trip.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- TRIP SCORE HUD -->\n  <div style=\"margin:18px -4px 8px;background:linear-gradient(180deg, rgba(46,28,16,.55), rgba(30,17,48,.6));border:1px solid var(--line-gold);border-radius:16px;padding:16px 16px 14px\">\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:10px;text-align:center\">\n      <div><div style=\"font-family:'DM Mono',monospace;font-size:2rem;color:var(--gold);line-height:1\">{{ trip.points }}<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px\">Points<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'DM Mono',monospace;font-size:2rem;color:var(--mint);line-height:1\">{{ trip.moments }}<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px\">Moments<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'DM Mono',monospace;font-size:2rem;color:var(--rose);line-height:1\">{{ trip.badgeCount }}<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px\">Badges<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'DM Mono',monospace;font-size:2rem;color:var(--text);line-height:1\">{{ trip.photoCount }}<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px\">Photos<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:8px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:14px\"><i style=\"display:block;height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1);background:linear-gradient(90deg,var(--mint-dim),var(--gold));width:{{ trip.pointsPct }}\"><\u002Fi><\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;margin-top:6px;font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted-2)\"><span>{{ trip.rankLabel }}<\u002Fspan><span>{{ trip.pointsOfMax }}<\u002Fspan><\u002Fdiv>\n    <div style=\"text-align:center;margin-top:10px;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:{{ trip.syncColor }}\">{{ trip.syncLabel }}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <nav style=\"display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 8px\">\n    <sc-for list=\"{{ liveNav }}\" as=\"l\" hint-placeholder-count=\"6\"><a href=\"{{ l.href }}\" style=\"text-decoration:none;color:var(--muted);border:1px solid var(--line-gold);border-radius:99px;padding:5px 11px;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase\" style-hover=\"color:var(--gold);background:rgba(237,192,106,.06)\">{{ l.label }}<\u002Fa><\u002Fsc-for>\n  <\u002Fnav>\n\n  <!-- SCAVENGER HUNT -->\n  <section id=\"hunt\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface-2);border:1px solid var(--line-gold);border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:120px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--gold),transparent 80%)\"><\u002Fdiv>\n    <h2 style=\"font-size:1.9rem;font-weight:500;margin:0 0 4px;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">HUNT<\u002Fspan>The Scavenger Hunt<\u002Fh2>\n    <p style=\"color:var(--muted);margin:6px 0 14px;font-size:1.1rem;font-style:italic\">Tap a challenge when you land it. Drop a proof photo. Bosses are worth the most — go get them.<\u002Fp>\n    <sc-for list=\"{{ huntGroups }}\" as=\"grp\" hint-placeholder-count=\"3\">\n      <h3 style=\"font-size:1.15rem;font-weight:600;color:var(--gold);margin:16px 0 8px;letter-spacing:.3px\">{{ grp.name }}<\u002Fh3>\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <sc-for list=\"{{ grp.items }}\" as=\"h\" hint-placeholder-count=\"4\">\n          <div style=\"{{ h.cardStyle }}\">\n            <div style=\"display:flex;gap:12px;align-items:flex-start\">\n              <span style=\"{{ h.boxStyle }}\" onclick=\"{{ h.toggle }}\"><span style=\"{{ h.dotStyle }}\"><\u002Fspan><\u002Fspan>\n              <div style=\"flex:1;min-width:0;cursor:pointer\" onclick=\"{{ h.toggle }}\">\n                <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\"><span style=\"{{ h.titleStyle }}\">{{ h.title }}<\u002Fspan><span style=\"font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:{{ h.tierColor }};border:1px solid {{ h.tierColor }};border-radius:99px;padding:1px 7px\">{{ h.tierLabel }}<\u002Fspan><span style=\"font-family:'DM Mono',monospace;font-size:.66rem;color:var(--gold)\">+{{ h.pts }}<\u002Fspan><\u002Fdiv>\n                <div style=\"color:var(--muted);font-size:1.02rem;margin-top:2px\">{{ h.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:0 0 auto;width:74px;height:74px;border-radius:10px;position:relative;border:1px dashed var(--line-gold);background:rgba(0,0,0,.15)\" ondragover=\"{{ over }}\" ondrop=\"{{ h.onDrop }}\">\n                <sc-if value=\"{{ h.url }}\" hint-placeholder-val=\"{{ false }}\">{{ h.img }}<button onclick=\"{{ h.onRemove }}\" style=\"position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;border:none;background:var(--plum-deep);color:var(--rose);font-size:.7rem;cursor:pointer;line-height:1\">✕<\u002Fbutton><\u002Fsc-if>\n                <sc-if value=\"{{ h.empty }}\" hint-placeholder-val=\"{{ true }}\"><label style=\"position:absolute;inset:0;display:grid;place-items:center;cursor:pointer;font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-dim);text-align:center;line-height:1.4\">＋<br>proof<input type=\"file\" accept=\"image/*\" onchange=\"{{ h.onPick }}\" style=\"display:none\"><\u002Flabel><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fsection>\n\n  <!-- BINGO -->\n  <section id=\"bingo\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface-2);border:1px solid var(--line-gold);border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:120px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--gold),transparent 80%)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:4px\"><h2 style=\"font-size:1.9rem;font-weight:500;margin:0;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">GRID<\u002Fspan>Denver Bingo<\u002Fh2><span style=\"font-family:'DM Mono',monospace;font-size:.66rem;color:var(--mint)\">{{ trip.moments }} / 16<\u002Fspan><\u002Fdiv>\n    <p style=\"color:var(--muted);margin:6px 0 14px;font-size:1.05rem;font-style:italic\">Sixteen little Denver moments. Tap each as you catch it. A full line unlocks a badge.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:7px\">\n      <sc-for list=\"{{ bingoCells }}\" as=\"c\" hint-placeholder-count=\"16\">\n        <div style=\"{{ c.style }}\" onclick=\"{{ c.toggle }}\"><span style=\"{{ c.textStyle }}\">{{ c.label }}<\u002Fspan><sc-if value=\"{{ c.on }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;top:6px;right:8px;color:var(--gold);font-size:.8rem\">✦<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BADGES -->\n  <section id=\"badges\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface-2);border:1px solid var(--line-gold);border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:120px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--gold),transparent 80%)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:4px\"><h2 style=\"font-size:1.9rem;font-weight:500;margin:0;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">✦<\u002Fspan>Badges<\u002Fh2><span style=\"font-family:'DM Mono',monospace;font-size:.66rem;color:var(--rose)\">{{ trip.badgeCount }} / {{ trip.badgeTotal }}<\u002Fspan><\u002Fdiv>\n    <p style=\"color:var(--muted);margin:6px 0 14px;font-size:1.05rem;font-style:italic\">They light up on their own as you earn them. No tapping required.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px\">\n      <sc-for list=\"{{ badges }}\" as=\"b\" hint-placeholder-count=\"9\">\n        <div style=\"{{ b.style }}\">\n          <div style=\"{{ b.iconStyle }}\">{{ b.icon }}<\u002Fdiv>\n          <div style=\"{{ b.nameStyle }}\">{{ b.name }}<\u002Fdiv>\n          <div style=\"font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.04em;color:var(--muted-2);text-transform:uppercase;margin-top:3px;line-height:1.4\">{{ b.desc }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PHOTO DUMP -->\n  <section id=\"dump\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface-2);border:1px solid var(--line-gold);border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:120px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--gold),transparent 80%)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:4px\"><h2 style=\"font-size:1.9rem;font-weight:500;margin:0;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">DUMP<\u002Fspan>The Photo Wall<\u002Fh2><\u002Fdiv>\n    <p style=\"color:var(--muted);margin:6px 0 14px;font-size:1.05rem;font-style:italic\">Everything that doesn't need a caption. Drag photos in, or tap the tile. Keeps growing.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px\" ondragover=\"{{ over }}\" ondrop=\"{{ onDumpDrop }}\">\n      <sc-for list=\"{{ dumpPhotos }}\" as=\"p\" hint-placeholder-count=\"0\">\n        <div style=\"position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;border:1px solid var(--line)\">{{ p.img }}<button onclick=\"{{ p.onRemove }}\" style=\"position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;border:none;background:rgba(22,12,34,.8);color:var(--rose);font-size:.72rem;cursor:pointer\">✕<\u002Fbutton><\u002Fdiv>\n      <\u002Fsc-for>\n      <label style=\"aspect-ratio:1;border-radius:12px;border:1.5px dashed var(--line-gold);display:grid;place-items:center;cursor:pointer;background:rgba(0,0,0,.15)\" style-hover=\"background:rgba(237,192,106,.06)\"><span style=\"font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-dim);text-align:center;line-height:1.6\">＋<br>add photos<\u002Fspan><input type=\"file\" accept=\"image/*\" multiple=\"\" onchange=\"{{ onDumpPick }}\" style=\"display:none\"><\u002Flabel>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- JOURNAL -->\n  <section id=\"journal\" style=\"margin:22px 0;padding:20px 18px;background:var(--surface-2);border:1px solid var(--line-gold);border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:120px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--gold),transparent 80%)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:4px\"><h2 style=\"font-size:1.9rem;font-weight:500;margin:0;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">LOG<\u002Fspan>The Day Log<\u002Fh2><\u002Fdiv>\n    <p style=\"color:var(--muted);margin:6px 0 16px;font-size:1.05rem;font-style:italic\">A few lines a day. A highlight. A couple photos. Future-you will be so glad you did.<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;gap:16px\">\n      <sc-for list=\"{{ journalDays }}\" as=\"d\" hint-placeholder-count=\"4\">\n        <div style=\"border:1px solid var(--line);border-radius:14px;background:rgba(0,0,0,.14);padding:14px 15px\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:8px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)\">{{ d.date }}<\u002Fspan><span style=\"font-size:1.35rem;color:var(--text)\">{{ d.label }}<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin-bottom:4px\">Highlight of the day<\u002Fdiv>\n          <input type=\"text\" value=\"{{ d.highlight }}\" onchange=\"{{ d.onHigh }}\" placeholder=\"the one thing you'll remember…\" style=\"width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--gold);font-family:'Work Sans',sans-serif;font-style:italic;font-size:1.05rem;padding:4px 0 8px;outline:none\">\n          <div style=\"font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin:12px 0 4px\">Notes<\u002Fdiv>\n          <textarea rows=\"3\" value=\"{{ d.note }}\" onchange=\"{{ d.onNote }}\" placeholder=\"what happened, how it felt, who said what…\" style=\"width:100%;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:10px;color:var(--text);font-family:'Work Sans',sans-serif;font-size:.98rem;line-height:1.55;padding:10px 12px;outline:none;resize:vertical\"><\u002Ftextarea>\n          <div style=\"display:flex;gap:8px;margin-top:10px\">\n            <sc-for list=\"{{ d.slots }}\" as=\"s\" hint-placeholder-count=\"2\">\n              <div style=\"flex:1;aspect-ratio:16/10;border-radius:10px;position:relative;border:1px dashed var(--line-gold);background:rgba(0,0,0,.15)\" ondragover=\"{{ over }}\" ondrop=\"{{ s.onDrop }}\">\n                <sc-if value=\"{{ s.url }}\" hint-placeholder-val=\"{{ false }}\">{{ s.img }}<button onclick=\"{{ s.onRemove }}\" style=\"position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;border:none;background:var(--plum-deep);color:var(--rose);font-size:.7rem;cursor:pointer\">✕<\u002Fbutton><\u002Fsc-if>\n                <sc-if value=\"{{ s.empty }}\" hint-placeholder-val=\"{{ true }}\"><label style=\"position:absolute;inset:0;display:grid;place-items:center;cursor:pointer;font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-dim)\">＋ photo<input type=\"file\" accept=\"image/*\" onchange=\"{{ s.onPick }}\" style=\"display:none\"><\u002Flabel><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RECAP -->\n  <section id=\"recap\" style=\"margin:22px 0;padding:22px 18px;background:linear-gradient(180deg, rgba(46,28,16,.4), var(--surface-2));border:1px solid var(--line-gold);border-radius:18px;position:relative;overflow:hidden;scroll-margin-top:120px\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--gold),var(--rose))\"><\u002Fdiv>\n    <h2 style=\"font-size:1.9rem;font-weight:500;margin:0 0 4px;letter-spacing:.4px\"><span style=\"font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-right:8px\">✦<\u002Fspan>The Keepsake<\u002Fh2>\n    <p style=\"color:var(--muted);margin:6px 0 16px;font-size:1.1rem;font-style:italic\">When you're home and it's over — the whole thing, at a glance. Share this page with Sheena.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px\">\n      <sc-for list=\"{{ recapStats }}\" as=\"st\" hint-placeholder-count=\"5\">\n        <div style=\"text-align:center;padding:12px 6px;border:1px solid var(--line);border-radius:12px;background:rgba(0,0,0,.14)\"><div style=\"font-family:'DM Mono',monospace;font-size:1.7rem;color:var(--gold);line-height:1\">{{ st.value }}<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:5px\">{{ st.label }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin-bottom:8px\">The gallery — every photo, together<\u002Fdiv>\n    <sc-if value=\"{{ hasPhotos }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;margin-bottom:18px\">\n        <sc-for list=\"{{ allPhotos }}\" as=\"p\" hint-placeholder-count=\"0\"><div style=\"aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--line)\">{{ p.img }}<\u002Fdiv><\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ noPhotos }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"border:1px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--muted-2);font-style:italic;margin-bottom:18px\">Photos you add anywhere above land here too. The gallery fills as the trip does.<\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin-bottom:6px\">A closing note<\u002Fdiv>\n    <textarea rows=\"4\" value=\"{{ closing }}\" onchange=\"{{ onClosing }}\" placeholder=\"Write the last word once you're home — what the trip gave you, what you want to keep…\" style=\"width:100%;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:12px;color:var(--gold);font-family:'Work Sans',sans-serif;font-style:italic;font-size:1.05rem;line-height:1.55;padding:12px 14px;outline:none;resize:vertical\"><\u002Ftextarea>\n  <\u002Fsection>\n\n  <footer style=\"margin-top:34px;text-align:center\">\n    <button onclick=\"{{ resetChecks }}\" style=\"font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);background:none;border:1px solid var(--line);border-radius:99px;padding:8px 16px;cursor:pointer\" style-hover=\"color:var(--rose);border-color:var(--rose)\">Reset prep checkboxes<\u002Fbutton>\n    <p style=\"margin-top:16px;color:var(--muted-2);font-style:italic\">The only real work is Sunday before 3. Everything else is 20 minutes, motion, or memory. Go be where you're going. — for Steph &amp; Sheena ✦<\u002Fp>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<sc-if value=\"{{ celebrate }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;left:50%;bottom:40px;z-index:50;transform:translateX(-50%);background:linear-gradient(90deg,var(--gold),var(--rose));color:var(--plum-deep);font-family:'DM Mono',monospace;font-size:.8rem;letter-spacing:.06em;padding:10px 20px;border-radius:99px;box-shadow:0 8px 30px rgba(0,0,0,.4);animation:floatToast 1.6s ease forwards\">{{ celebrate }}<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;celebrationFx&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Trip feel&quot;},&quot;bossHighlight&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Trip feel&quot;}}\">\nclass Component extends DCLogic {\n  state = { checks:{}, hunt:{}, bingo:{}, journal:{}, closing:'', photos:{}, dumpCount:0, ready:false, celebrate:'', cloud:'local', nicoleNote:'', collapsed:{}, autoDone:{} };\n  DEFAULT_NICOLE='Nicole — thank you!! \\uD83D\\uDC9B\\n\\nKiki\\u2019s the only one home and she\\u2019s friendly. Rundown:\\n\\nFOOD — Dry food is out; top up if low. Treats in [___].\\nWATER — Auto-feeder + backup bowl in [room]. Refill both.\\nLITTER — Scoop it; extra bags + scoop are right there.\\nAC — Set to ~68\\u00B0. I can adjust it from my phone (Alexa) and I\\u2019ll be checking Kiki on the Echo Show, so no need to touch it. If it\\u2019s clearly not running, text me.\\nPLANTS — If it hasn\\u2019t rained in a day or two, water the [porch/garden] plants.\\nCASH — On the counter, for you. Thank you. \\uD83D\\uDE4F\\n\\nMy cell: [___]   \\u00B7   Vet: [name / number]\\n\\nYou\\u2019re a lifesaver. — Steph';\n  SB_URL='https://maapkfahesfeenkhbmzy.supabase.co';\n  SB_KEY='sb_publishable_eimCwBt9wSEvHcXuPI4qiA_bfquy-n-';\n  TRIP='denver-2026';\n  BUCKET='trip-photos';\n\n  data = {\n    legs: [\n      { code:'4528', route
