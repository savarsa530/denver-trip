s', tag:'boss', txt:'~9:30–10p — 20 min: toiletries → quart bag, charge battery + phone, lay out travel clothes, ID by door' },\n        { id:'s2d', txt:'10:30 — Bed. Alarm 5:45.' },\n        { id:'s2e', tier:'presence', txt:'When you close the laptop, notice it. Work\\u2019s done. The trip starts in your body now.' }\n      ]},\n      { title:'Ch. 3 — Tue Jul 7 · Launch 🚀', sub:'', items:[\n        { id:'s3a', txt:'5:45 — Up, ready, eat something' },\n        { id:'s3b', txt:'6:15 — Kiki: food, water, litter, AC set + verified, doors/windows' },\n        { id:'s3c', txt:'6:40 — Final sweep (morning-of list), bag in car' },\n        { id:'s3d', txt:'6:50 — Drive to PWM (~35 min)' },\n        { id:'s3e', txt:'7:30 — Park garage, photo spot, ticket in wallet' },\n        { id:'s3f', txt:'7:45 — Check in / security' },\n        { id:'s3g', tier:'boss', tag:'boss', txt:'10:30 — PWM → BWI 🛫 · seat 15F' },\n        { id:'s3h', txt:'BWI 65-min connection: check gate FIRST, walk straight there. Bathroom + food at the gate.' },\n        { id:'s3i', txt:'1:10 — BWI → DEN · 22A. Sheena at DEN 3:00.' },\n        { id:'s3j', tier:'presence', txt:'15F window. When you\\u2019re airborne, look out. That\\u2019s the whole trip beginning.' }\n      ]}\n    ],\n    hunt: [\n      { id:'casa-cliff', group:'Casa Bonita', tier:'boss', pts:500, title:'The Cliff Diver', desc:'The 30-foot lagoon plunge. Get the splash frozen mid-air.' },\n      { id:'casa-sopapilla', group:'Casa Bonita', tier:'easy', pts:100, title:'Sopapilla + Honey Bear', desc:'Raise the little flag for more. Squeeze the bear.' },\n      { id:'casa-cave', group:'Casa Bonita', tier:'med', pts:250, title:'Black Bart\\u2019s Cave', desc:'Find the spooky cave and go in.' },\n      { id:'casa-flag', group:'Casa Bonita', tier:'easy', pts:100, title:'Flag Up for Round Two', desc:'The universal Casa Bonita signal. Use it shamelessly.' },\n      { id:'meow-portal', group:'Meow Wolf', tier:'boss', pts:500, title:'Step Through a Portal', desc:'The moment the room stops making sense. Capture the doorway.' },\n      { id:'meow-fridge', group:'Meow Wolf', tier:'med', pts:250, title:'The Refrigerator Passage', desc:'A secret door hidden as furniture. Crawl through.' },\n      { id:'meow-neon', group:'Meow Wolf', tier:'easy', pts:100, title:'Bathed in Neon', desc:'A portrait lit entirely by the impossible glow.' },\n      { id:'meow-secret', group:'Meow Wolf', tier:'easy', pts:100, title:'Find a Hidden Door', desc:'Push on something that shouldn\\u2019t open. It does.' },\n      { id:'sheena-selfie', group:'Mile-High City', tier:'med', pts:250, title:'You + Sheena, Day One', desc:'The reunion shot. First real hug of the trip.' },\n      { id:'mountain', group:'Mile-High City', tier:'easy', pts:100, title:'The Rockies on the Horizon', desc:'Look west. There they are.' },\n      { id:'mile-high', group:'Mile-High City', tier:'med', pts:250, title:'Exactly 5,280 ft', desc:'The mile-high marker step — Capitol or Coors Field.' },\n      { id:'sketch', group:'Mile-High City', tier:'easy', pts:100, title:'A Sketchbook Page, Used', desc:'Proof the art happened. Any line counts.' }\n    ],\n    bingoCells: [\n      'Green chile on something','A cliff diver','Sopapilla + honey','Meow Wolf neon',\n      'A secret door','Rockies at sunset','Sheena laughing','Guest-room morning light',\n      'A thin-air moment','Local coffee','A good mural','Patio dinner',\n      'A cool license plate','A dog you met','Sketch in progress','The Casa Bonita sign'\n    ],\n    badges: [\n      { id:'firstlight', icon:'✦', name:'First Light', desc:'Your first Denver moment' },\n      { id:'casa', icon:'◆', name:'Cliff Diver', desc:'Nailed the Casa dive shot' },\n      { id:'meow', icon:'✧', name:'Rabbit Hole', desc:'Through a Meow Wolf portal' },\n      { id:'sheena', icon:'❀', name:'Reunited', desc:'You + Sheena, documented' },\n      { id:'line', icon:'▤', name:'Line \\u2019Em Up', desc:'A full bingo line' },\n      { id:'blackout', icon:'■', name:'Blackout', desc:'All 16 moments caught' },\n      { id:'chronicler', icon:'✎', name:'Chronicler', desc:'Journaled all four days' },\n      { id:'shutter', icon:'◉', name:'Shutterbug', desc:'10+ photos added' },\n      { id:'fullsend', icon:'★', name:'Full Send', desc:'Every hunt challenge cleared' }\n    ],\n    journalDays: [\n      { id:'jd-tue', date:'Tue · Jul 7', label:'Landing' },\n      { id:'jd-wed', date:'Wed · Jul 8', label:'Day Two' },\n      { id:'jd-thu', date:'Thu · Jul 9', label:'Casa Bonita Night' },\n      { id:'jd-fri', date:'Fri · Jul 10', label:'Last Look' }\n    ]\n  };\n\n  // ---------- persistence ----------\n  componentDidMount(){\n    const g=(k,d)=>{ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } };\n    this.setState({\n      checks:g('denver-checks',{}), hunt:g('denver-hunt',{}), bingo:g('denver-bingo',{}),\n      journal:g('denver-journal',{}), closing:g('denver-closing',''), dumpCount:g('denver-dumpcount',0),\n      nicoleNote:g('denver-nicole',this.DEFAULT_NICOLE),\n      collapsed:g('denver-collapsed',{}), autoDone:g('denver-autodone',{})\n    });\n    this.loadPhotos();\n    this.initCloud();\n  }\n  saveLS(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }\n\n  openDB(){ return new Promise((res,rej)=>{ const r=indexedDB.open('denver-trip',1); r.onupgradeneeded=()=>r.result.createObjectStore('photos'); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }\n  async idbSet(k,b){ const db=await this.openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('photos','readwrite'); tx.objectStore('photos').put(b,k); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }\n  async idbDel(k){ const db=await this.openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('photos','readwrite'); tx.objectStore('photos').delete(k); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }\n  async idbAll(){ const db=await this.openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('photos','readonly'); const st=tx.objectStore('photos'); const ks=st.getAllKeys(); const vs=st.getAll(); tx.oncomplete=()=>res({keys:ks.result,vals:vs.result}); tx.onerror=()=>rej(tx.error); }); }\n  async loadPhotos(){ try{ const {keys,vals}=await this.idbAll(); const p={}; keys.forEach((k,i)=>{ if(vals[i]) p[k]={url:URL.createObjectURL(vals[i]),path:null}; }); this.setState(st=>({photos:{...p,...st.photos},ready:true})); }catch(e){ this.setState({ready:true}); } }\n\n  loadSupaLib(){ return new Promise(res=>{ if(window.supabase) return res(); let n=0; const t=setInterval(()=>{ if(window.supabase||n++>60){ clearInterval(t); res(); } },100); }); }\n  async initCloud(){\n    try{\n      await this.loadSupaLib();\n      if(!window.supabase){ this.setState({cloud:'offline'}); return; }\n      this.sb=window.supabase.createClient(this.SB_URL,this.SB_KEY);\n      this.setState({cloud:'connecting'});\n      const {data,error}=await this.sb.from('trip_state').select('data').eq('id',this.TRIP).maybeSingle();\n      if(error) throw error;\n      if(data&&data.data) this.applyRemote(data.data);\n      else await this.sb.from('trip_state').upsert({id:this.TRIP,data:this.snapshot()});\n      this.sb.channel('trip-'+this.TRIP).on('postgres_changes',{event:'*',schema:'public',table:'trip_state',filter:'id=eq.'+this.TRIP},p=>{ if(p&&p.new&&p.new.data) this.applyRemote(p.new.data); }).subscribe();\n      this.setState({cloud:'live'});\n    }catch(e){ this.setState({cloud:'offline'}); }\n  }\n  snapshot(){ const s=this.state; const p={}; Object.keys(s.photos).forEach(k=>{ const ph=s.photos[k]; if(ph&&ph.path) p[k]={url:ph.url,path:ph.path}; }); return { checks:s.checks, hunt:s.hunt, bingo:s.bingo, journal:s.journal, closing:s.closing, photos:p, nicoleNote:s.nicoleNote }; }\n  pushState(){ if(!this.sb) return; clearTimeout(this._pt); this._pt=setTimeout(async()=>{ try{ await this.sb.from('trip_state').upsert({id:this.TRIP,data:this.snapshot(),updated_at:new Date().toISOString()}); }catch(e){} },450); }\n  applyRemote(d){ if(!d) return; const s=this.state; const u=(a,b)=>({...(a||{}),...(b||{})}); const journal=u(s.journal,d.journal); if(d.journal){ Object.keys(d.journal).forEach(day=>{ journal[day]=u(s.journal[day],d.journal[day]); }); } this.setState({ checks:u(s.checks,d.checks), hunt:u(s.hunt,d.hunt), bingo:u(s.bingo,d.bingo), journal, closing:(d.closing&&d.closing.length)?d.closing:s.closing, photos:u(s.photos,d.photos), nicoleNote:(d.nicoleNote&&d.nicoleNote.length)?d.nicoleNote:s.nicoleNote }); }\n\n  // ---------- toggles ----------\n  toggleCheck(id){ const c={...this.state.checks}; if(c[id])delete c[id]; else c[id]=1; this.setState({checks:c}); this.saveLS('denver-checks',c); this.pushState(); this.autoCollapse(c); }\n  toggleHunt(id){ const c={...this.state.hunt}; const was=!!c[id]; if(was)delete c[id]; else c[id]=1; this.setState({hunt:c}); this.saveLS('denver-hunt',c); this.pushState(); if(!was){ const h=this.data.hunt.find(x=>x.id===id); this.flash('+'+h.pts+' pts — '+h.title); } }\n  toggleBingo(i){ const c={...this.state.bingo}; if(c[i])delete c[i]; else { c[i]=1; this.flash('Moment caught ✦'); } this.setState({bingo:c}); this.saveLS('denver-bingo',c); this.pushState(); }\n  setJournal(day,field,val){ const j={...this.state.journal}; j[day]={...(j[day]||{}),[field]:val}; this.setState({journal:j}); this.saveLS('denver-journal',j); this.pushState(); }\n  setClosing(v){ this.setState({closing:v}); this.saveLS('denver-closing',v); this.pushState(); }\n  setNicole(v){ this.setState({nicoleNote:v}); this.saveLS('denver-nicole',v); this.pushState(); }\n  copyNicole(){ const done=this.state.copied_nicole; return { label:done?'Copied \\u2713':'Copy', style:`font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--plum-deep);background:${done?'var(--gold)':'var(--mint)'};border:none;border-radius:99px;padding:6px 12px;cursor:pointer;transition:.2s`, click:async()=>{ try{ await navigator.clipboard.writeText(this.state.nicoleNote); }catch(e){} this.setState({copied_nicole:true}); setTimeout(()=>this.setState({copied_nicole:false}),1600); } }; }\n  resetChecks(){ this.setState({checks:{},autoDone:{}}); this.saveLS('denver-checks',{}); this.saveLS('denver-autodone',{}); this.pushState(); }\n  secList(id){ const d=this.data; if(id==='kiki')return d.kiki; if(id==='parking')return d.parking; if(id==='pack')return [...d.packClothing,...d.packToiletries,...d.packElec]; if(id==='grocery')return [...d.groNow,...d.groFresh]; if(id==='count')return d.chapters.flatMap(c=>c.items); if(id==='dontforget')return d.morning; return []; }\n  toggleCollapse(id){ const c={...this.state.collapsed}; c[id]=!c[id]; this.setState({collapsed:c}); this.saveLS('denver-collapsed',c); }\n  autoCollapse(checks){ const ids=['kiki','parking','pack','grocery','count','dontforget']; const collapsed={...this.state.collapsed}; const autoDone={...this.state.autoDone}; let ch=false; ids.forEach(id=>{ const t=this.secList(id).filter(i=>i.tier!=='presence'); const done=t.length>0&&t.every(i=>checks[i.id]); if(done&&!autoDone[id]){ collapsed[id]=true; autoDone[id]=true; ch=true; } else if(!done&&autoDone[id]){ autoDone[id]=false; ch=true; } }); if(ch){ this.setState({collapsed,autoDone}); this.saveLS('denver-collapsed',collapsed); this.saveLS('denver-autodone',autoDone); } }\n  flash(msg){ if(this.props.celebrationFx===false) return; this.setState({celebrate:msg}); clearTimeout(this._ft); this._ft=setTimeout(()=>this.setState({celebrate:''}),1600); }\n\n  // ---------- photos ----------\n  over(e){ if(e&&e.preventDefault) e.preventDefault(); }\n  imgEl(url,r){ return url?React.createElement('img',{src:url,style:{width:'100%',height:'100%',objectFit:'cover',borderRadius:r,display:'block'}}):null; }\n  setPhoto(slot,val){ this.setState(st=>({photos:{...st.photos,[slot]:val}})); }\n  async putPhoto(slot,file){ if(!file) return; const localUrl=URL.createObjectURL(file); this.setPhoto(slot,{url:localUrl,path:null}); try{ await this.idbSet(slot,file); }catch(e){} if(this.sb){ try{ const ext=((file.name||'').split('.').pop()||'jpg').toLowerCase(); const path=this.TRIP+'/'+slot+'-'+Date.now()+'.'+ext; const up=await this.sb.storage.from(this.BUCKET).upload(path,file,{upsert:true,contentType:file.type||'image/jpeg'}); if(!up.error){ const pub=this.sb.storage.from(this.BUCKET).getPublicUrl(path); this.setPhoto(slot,{url:pub.data.publicUrl,path}); this.pushState(); } }catch(e){} } }\n  async delPhoto(slot){ const ph=this.state.photos[slot]; if(this.sb&&ph&&ph.path){ try{ await this.sb.storage.from(this.BUCKET).remove([ph.path]); }catch(e){} } try{ await this.idbDel(slot); }catch(e){} if(ph&&ph.url&&ph.url.indexOf('blob:')===0) URL.revokeObjectURL(ph.url); const p={...this.state.photos}; delete p[slot]; this.setState({photos:p}); this.pushState(); }\n  pick(slot,e){ const f=e.target.files&&e.target.files[0]; if(f) this.putPhoto(slot,f); e.target.value=''; }\n  drop(slot,e){ this.over(e); const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0]; if(f) this.putPhoto(slot,f); }\n  nextDump(){ let m=0; Object.keys(this.state.photos).forEach(k=>{ if(k.indexOf('dump-')===0){ const i=parseInt(k.slice(5)); if(i>m) m=i; } }); return m+1; }\n  async addDumpFiles(files){ const arr=[...files]; if(!arr.length) return; let n=this.nextDump(); for(const f of arr){ await this.putPhoto('dump-'+(n++),f); } }\n  dumpPick(e){ this.addDumpFiles(e.target.files||[]); e.target.value=''; }\n  dumpDrop(e){ this.over(e); if(e.dataTransfer&&e.dataTransfer.files) this.addDumpFiles(e.dataTransfer.files); }\n\n  // ---------- computed helpers ----------\n  boss(){ return this.props.bossHighlight!==false; }\n  itemView(it){\n    const on=!!this.state.checks[it.id];\n    const isP=it.tier==='presence';\n    const isBoss=it.tier==='boss';\n    const gold=isP||(isBoss&&this.boss());\n    const accent=gold?'var(--gold)':'var(--mint)';\n    const round=isP;\n    const boxStyle=`flex:0 0 auto;width:20px;height:20px;margin-top:3px;border-radius:${round?'50%':'6px'};border:1.5px solid ${on?accent:'var(--line-strong)'};display:grid;place-items:center;transition:border-color .2s`;\n    const dotStyle=`width:9px;height:9px;border-radius:${round?'50%':'2px'};background:${accent};transform:scale(${on?1:0});transition:transform .2s`;\n    let color='var(--text)', deco='';\n    if(isP) color='var(--gold)';\n    else if(isBoss) color=this.boss()?'var(--gold)':'var(--text)';\n    if(on&&!isP){ color='var(--muted-2)'; deco='text-decoration:line-through;text-decoration-color:rgba(157,144,182,.5);'; }\n    const txtStyle=`flex:1;font-size:1.12rem;${isP?'font-style:italic;':''}color:${color};${deco}transition:.2s`;\n    return { ...it, boxStyle, dotStyle, txtStyle, toggle:()=>this.toggleCheck(it.id) };\n  }\n  cleared(list){ const t=list.filter(i=>i.tier!=='presence'); const done=t.length>0&&t.every(i=>this.state.checks[i.id]); return { border:done?'var(--line-gold)':'var(--line)', rail:done?'linear-gradient(var(--gold),var(--gold-dim))':'linear-gradient(var(--mint-dim),transparent 70%)', op:done?1:.5, badge:done?1:0 }; }\n\n  renderVals(){\n    const s=this.state;\n    const collapse={}; ['kiki','parking','pack','grocery','count','dontforget'].forEach(id=>{ const open=!s.collapsed[id]; collapse[id]={ toggle:()=>this.toggleCollapse(id), rows:open?'1fr':'0fr', chevStyle:`font-size:1.05rem;line-height:1;color:var(--muted);transition:transform .3s;display:inline-block;transform:rotate(${open?180:0}deg)` }; });\n    const iv=(l)=>l.map(i=>this.itemView(i));\n    const allPrep=[...this.data.kiki,...this.data.parking,...this.data.packClothing,...this.data.packToiletries,...this.data.packElec,...this.data.groNow,...this.data.groFresh,...this.data.morning,...this.data.chapters.flatMap(c=>c.items)];\n    const tasks=allPrep.filter(i=>i.tier!=='presence');\n    const pres=allPrep.filter(i=>i.tier==='presence');\n    const td=tasks.filter(i=>s.checks[i.id]).length, pd=pres.filter(i=>s.checks[i.id]).length;\n    const notes=[\"Nothing\\u2019s on fire. Light one when you feel like it.\",\"You\\u2019re moving. The trip\\u2019s already begun in the doing.\",\"Rested is the goal, not the reward. You\\u2019re doing it right.\",\"Halfway. Notice you\\u2019re not rushing.\",\"Almost there — and a day early, on purpose.\",\"Ready and present. Go be where you\\u2019re going. ✦\"];\n    const pct=tasks.length?td/tasks.length:0;\n    const stars=tasks.map((t)=>({ style:`width:9px;height:9px;border-radius:50%;transition:all .4s;background:${s.checks[t.id]?'var(--gold)':'rgba(255,255,255,.09)'};${s.checks[t.id]?'box-shadow:0 0 8px 1px rgba(237,192,106,.7)':''}` }));\n\n    // hunt\n    const huntV=this.data.hunt.map(h=>{ const done=!!s.hunt[h.id]; const slot='hunt-'+h.id; const url=(s.photos[slot]&&s.photos[slot].url)||''; const tc=h.tier==='boss'?'var(--gold)':h.tier==='med'?'var(--mint)':'var(--mint-dim)';\n      return { ...h, done, url, empty:!url, img:this.imgEl(url,'10px'), tierColor:tc, tierLabel:h.tier==='boss'?'boss':h.tier==='med'?'medium':'easy',\n        cardStyle:`border:1px solid ${done?'var(--line-gold)':'var(--line)'};background:${done?'rgba(237,192,106,.06)':'rgba(0,0,0,.14)'};border-radius:14px;padding:12px 13px;transition:.2s`,\n        boxStyle:`flex:0 0 auto;width:24px;height:24px;margin-top:1px;border-radius:7px;border:1.5px solid ${done?'var(--gold)':'var(--line-strong)'};display:grid;place-items:center;cursor:pointer;transition:.2s`,\n        dotStyle:`width:11px;height:11px;border-radius:3px;background:var(--gold);transform:scale(${done?1:0});transition:transform .2s`,\n        titleStyle:`font-size:1.24rem;color:${done?'var(--gold)':'var(--text)'}`,\n        toggle:()=>this.toggleHunt(h.id),\n        onPick:(e)=>this.pick(slot,e), onDrop:(e)=>this.drop(slot,e), onRemove:()=>this.delPhoto(slot) };\n    });\n    const groups=['Casa Bonita','Meow Wolf','Mile-High City'].map(name=>({ name, items:huntV.filter(h=>h.group===name) }));\n    const points=this.data.hunt.reduce((a,h)=>a+(s.hunt[h.id]?h.pts:0),0);\n    const maxPts=this.data.hunt.reduce((a,h)=>a+h.pts,0);\n    const rank= points===0?'Just landed' : points<600?'Warming up' : points<1500?'On the hunt' : points<maxPts?'Denver regular' : 'Legend of the Mile';\n\n    // bingo\n    const bingoCells=this.data.bingoCells.map((label,i)=>{ const on=!!s.bingo[i];\n      return { i, label, on, toggle:()=>this.toggleBingo(i),\n        style:`position:relative;aspect-ratio:1;border-radius:10px;border:1px solid ${on?'var(--gold)':'var(--line)'};background:${on?'rgba(237,192,106,.12)':'rgba(0,0,0,.14)'};display:grid;place-items:center;padding:6px;text-align:center;cursor:pointer;transition:.2s`,\n        textStyle:`font-size:.92rem;line-height:1.2;color:${on?'var(--gold)':'var(--muted)'}` };\n    });\n    const moments=Object.keys(s.bingo).length;\n\n    // badges\n    const huntDone=this.data.hunt.filter(h=>s.hunt[h.id]).length;\n    const journaledDays=this.data.journalDays.filter(d=>{ const e=s.journal[d.id]; return e&&(((e.note||'').trim())||((e.highlight||'').trim())); }).length;\n    const photoCount=Object.keys(s.photos).length;\n    const b=s.bingo; const idx=(r,c)=>r*4+c; let lines=0;\n    for(let r=0;r<4;r++){ if([0,1,2,3].every(c=>b[idx(r,c)])) lines++; }\n    for(let c=0;c<4;c++){ if([0,1,2,3].every(r=>b[idx(r,c)])) lines++; }\n    if([0,1,2,3].every(k=>b[idx(k,k)])) lines++;\n    if([0,1,2,3].every(k=>b[idx(k,3-k)])) lines++;\n    const cond={ firstlight:huntDone>0||moments>0, casa:!!s.hunt['casa-cliff'], meow:!!s.hunt['meow-portal'], sheena:!!s.hunt['sheena-selfie'], line:lines>0, blackout:moments>=16, chronicler:journaledDays>=4, shutter:photoCount>=10, fullsend:huntDone>=this.data.hunt.length };\n    const badges=this.data.badges.map(bd=>{ const earned=!!cond[bd.id];\n      return { ...bd, style:`text-align:center;padding:14px 8px;border-radius:14px;border:1px solid ${earned?'var(--line-gold)':'var(--line)'};background:${earned?'rgba(237,192,106,.08)':'rgba(0,0,0,.12)'};${earned?'animation:pulseGlow 3.5s ease-in-out infinite':''}`,\n        iconStyle:`font-size:1.8rem;line-height:1;color:${earned?'var(--gold)':'var(--muted-2)'};${earned?'':'opacity:.35'}`,\n        nameStyle:`font-size:1.08rem;margin-top:6px;color:${earned?'var(--gold)':'var(--muted-2)'}` };\n    });\n    const badgeCount=badges.filter(x=>x.earned).length;\n\n    // dump\n    const dumpPhotos=Object.keys(s.photos).filter(k=>k.indexOf('dump-')===0).sort((a,b2)=>parseInt(a.slice(5))-parseInt(b2.slice(5))).map(slot=>({ url:s.photos[slot].url, img:this.imgEl(s.photos[slot].url,'0'), onRemove:()=>this.delPhoto(slot) }));\n\n    // journal\n    const journalDays=this.data.journalDays.map(d=>{ const e=s.journal[d.id]||{};\n      const slots=[1,2].map(n=>{ const slot=d.id+'-'+n; const url=(s.photos[slot]&&s.photos[slot].url)||''; return { url, empty:!url, img:this.imgEl(url,'10px'), onPick:(ev)=>this.pick(slot,ev), onDrop:(ev)=>this.drop(slot,ev), onRemove:()=>this.delPhoto(slot) }; });\n      return { ...d, note:e.note||'', highlight:e.highlight||'', onNote:(ev)=>this.setJournal(d.id,'note',ev.target.value), onHigh:(ev)=>this.setJournal(d.id,'highlight',ev.target.value), slots };\n    });\n\n    // recap\n    const allPhotos=Object.keys(s.photos).map(k=>({ url:s.photos[k].url, img:this.imgEl(s.photos[k].url,'0') }));\n    const recapStats=[\n      { value:points, label:'Points' },\n      { value:huntDone+'/'+this.data.hunt.length, label:'Challenges' },\n      { value:moments+'/16', label:'Moments' },\n      { value:badgeCount+'/'+this.data.badges.length, label:'Badges' },\n      { value:photoCount, label:'Photos' }\n    ];\n\n    return {\n      ready:s.ready, celebrate:s.celebrate,\n      legs:this.data.legs.map(l=>({ ...l, routeColor:l.dim?'var(--muted)':'var(--text)', hasflight:!!l.href, noflight:!!l.noflight })),\n      nicoleNote:s.nicoleNote, onNicole:(e)=>this.setNicole(e.target.value), copyNicole:this.copyNicole(),\n      navLinks:[['#trip','Trip'],['#kiki','Kiki'],['#nicole','Nicole'],['#parking','Parking'],['#pack','Packing'],['#grocery','Grocery'],['#count','Countdown'],['#dontforget','Morning'],['#live','▸ Live']].map(([href,label])=>({ href, label, border: href==='#live'?'var(--line-gold)':'var(--line)' })),\n      liveNav:[['#hunt','Hunt'],['#bingo','Bingo'],['#badges','Badges'],['#dump','Photos'],['#journal','Day Log'],['#recap','Keepsake']].map(([href,label])=>({ href, label })),\n      prep:{\n        readyVal:td+' / '+tasks.length, presentVal:pd+' / '+pres.length,\n        readyPct:(tasks.length?td/tasks.length*100:0)+'%', presentPct:(pres.length?pd/pres.length*100:0)+'%',\n        note:notes[Math.min(notes.length-1, Math.round(pct*(notes.length-1)))], stars,\n        kiki:iv(this.data.kiki), parking:iv(this.data.parking), packClothing:iv(this.data.packClothing), packToiletries:iv(this.data.packToiletries), packElec:iv(this.data.packElec), groNow:iv(this.data.groNow), groFresh:iv(this.data.groFresh), morning:iv(this.data.morning),\n        chapters:this.data.chapters.map(c=>({ ...c, items:iv(c.items) })),\n        kikiCleared:this.cleared(this.data.kiki), parkingCleared:this.cleared(this.data.parking),\n        packCleared:this.cleared([...this.data.packClothing,...this.data.packToiletries,...this.data.packElec]),\n        groceryCleared:this.cleared([...this.data.groNow,...this.data.groFresh]),\n        morningCleared:this.cleared(this.data.morning),\n        countdownCleared:this.cleared(this.data.chapters.flatMap(c=>c.items))\n      },\n      trip:{ points, moments, badgeCount, badgeTotal:this.data.badges.length, photoCount, pointsPct:(points/maxPts*100)+'%', pointsOfMax:points+' / '+maxPts, rankLabel:rank,\n        syncLabel:{ live:'\\u25CF Shared live — you & Sheena', connecting:'\\u25CB Connecting…', offline:'\\u25CB Offline — saved on this device', local:'\\u25CB Connecting…' }[s.cloud],\n        syncColor:{ live:'var(--mint)', connecting:'var(--muted-2)', offline:'var(--gold-dim)', local:'var(--muted-2)' }[s.cloud] },\n      huntGroups:groups, over:(e)=>this.over(e),\n      bingoCells, badges,\n      dumpPhotos, onDumpPick:(e)=>this.dumpPick(e), onDumpDrop:(e)=>this.dumpDrop(e),\n      journalDays,\n      recapStats, allPhotos, hasPhotos:allPhotos.length>0, noPhotos:allPhotos.length===0,\n      closing:s.closing, onClosing:(e)=>this.setClosing(e.target.value),\n      collapse, resetChecks:()=>this.resetChecks()\n    };\n  }\n\n  copyBtn(key,text){\n    const done=this.state['copied_'+key];\n    return { text, label:done?'Copied ✓':'Copy',\n      style:`font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--plum-deep);background:${done?'var(--gold)':'var(--mint)'};border:none;border-radius:99px;padding:6px 12px;cursor:pointer;transition:.2s`,\n      click:async()=>{ try{ await navigator.clipboard.writeText(text); }catch(e){} this.setState({['copied_'+key]:true}); setTimeout(()=>this.setState({['copied_'+key]:false}),1600); } };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
